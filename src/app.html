<!doctype html>
<html lang="en" class="background-theme-background dark text-theme-text">
	<head>
		<meta charset="utf-8" />
		<title>F2L Trainer</title>
		<script>
			// Fix for PWA start_url pointing to /index.html which confuses SvelteKit router
			if (window.location.pathname.endsWith('/index.html')) {
				window.history.replaceState(
					null,
					'',
					window.location.pathname.replace(/\/index.html$/, '/')
				);
			}
		</script>
		<link rel="icon" href="%sveltekit.assets%/full_cube.svg" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
		<script src="%sveltekit.assets%/pwa-capture.js"></script>
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO & Social Sharing -->
		<meta
			name="description"
			content="Master F2L algorithms for Rubik's Cube speedsolving. Features 3D visualization, smart cube support, and algorithm drills."
		/>
		<meta name="theme-color" content="#1f2937" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://f2l-trainer.top/" />
		<meta property="og:title" content="F2L Trainer" />
		<meta
			property="og:description"
			content="Master F2L algorithms with interactive 3D training and smart cube support."
		/>
		<meta property="og:image" content="https://f2l-trainer.top/images/screenshot-wide.png" />

		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image" />
		<meta property="twitter:url" content="https://f2l-trainer.top/" />
		<meta property="twitter:title" content="F2L Trainer" />
		<meta
			property="twitter:description"
			content="Master F2L algorithms with interactive 3D training and smart cube support."
		/>
		<meta property="twitter:image" content="https://f2l-trainer.top/images/screenshot-wide.png" />

		<link rel="apple-touch-icon" href="%sveltekit.assets%/images/icon-192.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<style>
			#initial-loader {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				bottom: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				background-color: #111827; /* Gray-900 */
				color: white;
				z-index: 999999;
				transition: opacity 0.4s ease-out;
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					'Segoe UI',
					Roboto,
					'Helvetica Neue',
					Arial,
					sans-serif;
			}
			.loader-cube {
				width: 72px;
				height: 72px;
				animation: loader-spin 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
			}
			@keyframes loader-spin {
				0% {
					transform: rotate(0deg) scale(1);
				}
				50% {
					transform: rotate(180deg) scale(1.1);
				}
				100% {
					transform: rotate(360deg) scale(1);
				}
			}
			@media (prefers-color-scheme: light) {
				#initial-loader {
					background-color: #f3f4f6; /* Gray-100 */
					color: #111827; /* Gray-900 */
				}
				.progress-container {
					background-color: rgba(17, 24, 39, 0.1);
				}
			}
			.progress-container {
				width: 240px;
				height: 6px;
				background-color: rgba(255, 255, 255, 0.15);
				border-radius: 9999px;
				margin-top: 2rem;
				overflow: hidden;
			}
			.progress-bar {
				height: 100%;
				width: 0%;
				background-color: #3b82f6; /* Blue-500 */
				border-radius: 9999px;
				transition: width 0.1s linear;
			}
		</style>
		<div id="initial-loader">
			<img src="%sveltekit.assets%/full_cube.svg" alt="Loading" class="loader-cube" />
			<h2
				style="
					margin: 1.5rem 0 0 0;
					font-weight: 700;
					font-size: 1.75rem;
					letter-spacing: -0.025em;
					line-height: 1;
				"
			>
				F2L Trainer
			</h2>
			<div class="progress-container">
				<div id="loading-progress" class="progress-bar"></div>
			</div>
			<script>
				(function () {
					var progressBar = document.getElementById('loading-progress');
					var progress = 0;
					// The bar moves quickly at first, then slows down, asymptoting at 95%
					var interval = setInterval(function () {
						var remaining = 95 - progress;
						var step = remaining * 0.05; // Move 5% of the remaining distance
						if (step < 0.05) step = 0.05;

						progress += step;
						if (progress >= 95) {
							progress = 95;
							clearInterval(interval);
						}

						if (progressBar) {
							progressBar.style.width = progress + '%';
						}
					}, 100);

					// Expose a function to complete the progress when Svelte finishes hydrating
					window.completeLoadingProgress = function () {
						clearInterval(interval);
						if (progressBar) {
							// Fast transition to 100%
							progressBar.style.transition = 'width 0.2s ease-out';
							progressBar.style.width = '100%';
						}
					};
				})();
			</script>
		</div>
		<div class="background-theme-background text-theme-text">%sveltekit.body%</div>
	</body>
</html>
